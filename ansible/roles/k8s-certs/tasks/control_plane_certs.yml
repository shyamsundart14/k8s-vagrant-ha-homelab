---
# =============================================================================
# Control Plane Certificates - Direct Issuance
# =============================================================================
# Issues control plane certs, deploys directly to master nodes.
# Some certs are shared (same on both masters), others are per-node.
# =============================================================================

# -----------------------------------------------------------------------------
# Shared Control Plane Certificates (same on all masters)
# -----------------------------------------------------------------------------

# kube-apiserver certificate
- name: Issue kube-apiserver certificate
  community.hashi_vault.vault_write:
    url: "{{ vault_addr }}"
    token: "{{ vault_token }}"
    path: "{{ pki_kubernetes_path }}/issue/kube-apiserver"
    data:
      common_name: "kube-apiserver"
      alt_names: "kubernetes,kubernetes.default,kubernetes.default.svc,kubernetes.default.svc.cluster.local,master-1,master-2,haproxy"
      ip_sans: "{{ haproxy_ip }},{{ master_ips['master-1'] }},{{ master_ips['master-2'] }},{{ service_cidr_first_ip }},127.0.0.1"
      ttl: "{{ cert_ttl }}"
  register: apiserver_cert
  delegate_to: localhost
  run_once: true

- name: Deploy kube-apiserver certificate
  ansible.builtin.copy:
    content: "{{ apiserver_cert.data.data.certificate }}"
    dest: "{{ k8s_cert_dir }}/apiserver.crt"
    mode: '0644'
  become: true

- name: Deploy kube-apiserver key
  ansible.builtin.copy:
    content: "{{ apiserver_cert.data.data.private_key }}"
    dest: "{{ k8s_cert_dir }}/apiserver.key"
    mode: '0600'
  become: true

