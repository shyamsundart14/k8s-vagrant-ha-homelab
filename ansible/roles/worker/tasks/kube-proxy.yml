---
# kube-proxy configuration

- name: Create kube-proxy kubeconfig
  ansible.builtin.template:
    src: kube-proxy.kubeconfig.j2
    dest: "{{ k8s_config_dir }}/kube-proxy.kubeconfig"
    mode: '0600'
  become: true

- name: Create kube-proxy config
  ansible.builtin.template:
    src: kube-proxy-config.yaml.j2
    dest: "{{ k8s_config_dir }}/kube-proxy-config.yaml"
    mode: '0644'
  become: true

- name: Create kube-proxy systemd service
  ansible.builtin.template:
    src: kube-proxy.service.j2
    dest: /etc/systemd/system/kube-proxy.service
    mode: '0644'
  notify:
    - Reload systemd
    - Restart kube-proxy
  become: true

- name: Enable and start kube-proxy
  ansible.builtin.systemd:
    name: kube-proxy
    state: started
    enabled: true
    daemon_reload: true
  become: true
