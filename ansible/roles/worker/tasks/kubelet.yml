---
# Kubelet configuration

- name: Create kubelet kubeconfig
  ansible.builtin.template:
    src: kubelet.kubeconfig.j2
    dest: "{{ k8s_config_dir }}/kubelet.kubeconfig"
    mode: '0600'
  become: true

- name: Create kubelet config
  ansible.builtin.template:
    src: kubelet-config.yaml.j2
    dest: "{{ k8s_config_dir }}/kubelet-config.yaml"
    mode: '0644'
  become: true

- name: Create kubelet systemd service
  ansible.builtin.template:
    src: kubelet.service.j2
    dest: /etc/systemd/system/kubelet.service
    mode: '0644'
  notify:
    - Reload systemd
    - Restart kubelet
  become: true

- name: Enable and start kubelet
  ansible.builtin.systemd:
    name: kubelet
    state: started
    enabled: true
    daemon_reload: true
  become: true
