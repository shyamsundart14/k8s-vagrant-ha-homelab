---
# Jump server setup variables
jump_host_ip: "{{ network_prefix }}.12"

# SSH key used for accessing all VMs from jump
ssh_key_private_src: "{{ lookup('env', 'HOME') }}/.ssh/k8slab.key"
ssh_key_private_dest: "~/.ssh/k8slab.key"

# Network prefix for VM IPs - inherited from group_vars/all.yml
# network_prefix: defined in group_vars/all.yml

# All VMs (for SSH config generation)
vm_definitions:
  - { name: "haproxy",  ip_suffix: 10 }
  - { name: "vault",    ip_suffix: 11 }
  - { name: "etcd-1",   ip_suffix: 21 }
  - { name: "etcd-2",   ip_suffix: 22 }
  - { name: "etcd-3",   ip_suffix: 23 }
  - { name: "master-1", ip_suffix: 31 }
  - { name: "master-2", ip_suffix: 32 }
  - { name: "worker-1", ip_suffix: 41 }
  - { name: "worker-2", ip_suffix: 42 }
  - { name: "worker-3", ip_suffix: 43 }

# Project directory on jump
project_dir_jump: "~/vagrant-lab"
