---
# VM Provisioning Variables

# Directories
project_dir: "{{ ansible_env.HOME }}/k8s-utm-ha-homelab"
iso_dir: "{{ project_dir }}/iso"
img_dir: "{{ project_dir }}/images"
bin_dir: "{{ project_dir }}/k8s-binaries"
utm_dir: "{{ ansible_env.HOME }}/Library/Containers/com.utmapp.UTM/Data/Documents"

# Ubuntu Cloud Image
cloud_img_url: "https://cloud-images.ubuntu.com/releases/24.04/release/ubuntu-24.04-server-cloudimg-arm64.img"
cloud_img_base: "{{ img_dir }}/ubuntu-24.04-cloudimg-arm64.img"

# SSH Key
ssh_key_private: "{{ ansible_env.HOME }}/.ssh/k8slab.key"
ssh_key_public: "{{ ssh_key_private }}.pub"

# Network
network_prefix: "{{ network_prefix }}"

# VM Definitions: name, ip_suffix, ram_mb, vcpu, disk_gb
vm_definitions:
  - { name: "haproxy",  ip_suffix: 10, ram_mb: 2048, vcpu: 2, disk_gb: 20 }
  - { name: "vault",    ip_suffix: 11, ram_mb: 4096, vcpu: 2, disk_gb: 20 }
  - { name: "jump",     ip_suffix: 12, ram_mb: 4096, vcpu: 2, disk_gb: 20 }
  - { name: "etcd-1",   ip_suffix: 21, ram_mb: 2048, vcpu: 2, disk_gb: 20 }
  - { name: "etcd-2",   ip_suffix: 22, ram_mb: 2048, vcpu: 2, disk_gb: 20 }
  - { name: "etcd-3",   ip_suffix: 23, ram_mb: 2048, vcpu: 2, disk_gb: 20 }
  - { name: "master-1", ip_suffix: 31, ram_mb: 4096, vcpu: 2, disk_gb: 30 }
  - { name: "master-2", ip_suffix: 32, ram_mb: 4096, vcpu: 2, disk_gb: 30 }
  - { name: "worker-1", ip_suffix: 41, ram_mb: 6144, vcpu: 2, disk_gb: 40 }
  - { name: "worker-2", ip_suffix: 42, ram_mb: 6144, vcpu: 2, disk_gb: 40 }
  - { name: "worker-3", ip_suffix: 43, ram_mb: 6144, vcpu: 2, disk_gb: 40 }

# /etc/hosts entries for all VMs
hosts_entries: |
  # K8s Homelab VMs
  {{ network_prefix }}.10  haproxy
  {{ network_prefix }}.11  vault
  {{ network_prefix }}.12  jump
  {{ network_prefix }}.21  etcd-1
  {{ network_prefix }}.22  etcd-2
  {{ network_prefix }}.23  etcd-3
  {{ network_prefix }}.31  master-1
  {{ network_prefix }}.32  master-2
  {{ network_prefix }}.41  worker-1
  {{ network_prefix }}.42  worker-2
  {{ network_prefix }}.43  worker-3
