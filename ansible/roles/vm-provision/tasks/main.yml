---
# =============================================================================
# VM Provisioning Role - Main Tasks
# =============================================================================
# Creates UTM VMs with cloud-init on macOS (runs on localhost)
#
# Steps:
#   1. Download Ubuntu cloud image
#   2. Generate SSH key pair (if needed)
#   3. Create cloud-init ISOs and VM disk images
#   4. Create UTM VM bundles (config.plist + disks)
#   5. Restart UTM
#   6. Start all VMs
#
# NOTE: Does NOT wait for SSH. The wait is done later in k8s-utm-ha-homelab.yml
#       so mac-setup + binary downloads can run while VMs boot.
# =============================================================================

- name: Create required directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: '0755'
  loop:
    - "{{ iso_dir }}"
    - "{{ img_dir }}"
    - "{{ bin_dir }}"

# ---- Step 1: Download cloud image ----
- name: Check if cloud image exists
  ansible.builtin.stat:
    path: "{{ cloud_img_base }}"
  register: cloud_img_stat

- name: Download Ubuntu 24.04 cloud image
  ansible.builtin.get_url:
    url: "{{ cloud_img_url }}"
    dest: "{{ cloud_img_base }}"
    mode: '0644'
  when: not cloud_img_stat.stat.exists or cloud_img_stat.stat.size < 500000000

# ---- Step 2: SSH key ----
- name: Check if SSH key exists
  ansible.builtin.stat:
    path: "{{ ssh_key_private }}"
  register: ssh_key_stat

- name: Generate SSH key pair
  community.crypto.openssh_keypair:
    path: "{{ ssh_key_private }}"
    type: ed25519
    comment: "k8s-utm-ha-homelab"
    mode: '0600'
  when: not ssh_key_stat.stat.exists

- name: Read SSH public key
  ansible.builtin.slurp:
    src: "{{ ssh_key_public }}"
  register: ssh_pub_key_content

- name: Set SSH public key fact
  ansible.builtin.set_fact:
    ssh_public_key: "{{ ssh_pub_key_content.content | b64decode | trim }}"

# ---- Step 3-4: Create VMs ----
- name: Create each VM
  ansible.builtin.include_tasks: create_vm.yml
  loop: "{{ vm_definitions }}"
  loop_control:
    loop_var: vm
  vars:
    vm_name: "{{ vm.name }}"
    vm_ip: "{{ network_prefix }}.{{ vm.ip_suffix }}"
    vm_ram_mb: "{{ vm.ram_mb }}"
    vm_vcpu: "{{ vm.vcpu }}"
    vm_disk_gb: "{{ vm.disk_gb }}"

# ---- Step 5: Restart UTM ----
- name: Stop UTM
  ansible.builtin.command:
    cmd: pkill -x UTM
  register: pkill_result
  failed_when: false
  changed_when: pkill_result.rc == 0

- name: Wait for UTM to stop
  ansible.builtin.pause:
    seconds: 2

- name: Start UTM
  ansible.builtin.command:
    cmd: open -a UTM
  changed_when: true

- name: Wait for UTM to load
  ansible.builtin.pause:
    seconds: 5

# ---- Step 6: Start all VMs ----
- name: Start each VM
  ansible.builtin.command:
    cmd: "utmctl start {{ vm.name }}"
  loop: "{{ vm_definitions }}"
  loop_control:
    loop_var: vm
    pause: 2
  register: start_results
  failed_when: false
  changed_when: start_results.rc == 0

- name: VMs started - boot in progress
  ansible.builtin.debug:
    msg: "All {{ vm_definitions | length }} VMs started. Boot in progress (SSH wait deferred for parallelism)."
