---
# kube-scheduler configuration

- name: Create kube-scheduler kubeconfig
  ansible.builtin.template:
    src: scheduler.kubeconfig.j2
    dest: "{{ k8s_config_dir }}/scheduler.kubeconfig"
    mode: '0600'
  become: true

- name: Create kube-scheduler config
  ansible.builtin.template:
    src: kube-scheduler-config.yaml.j2
    dest: "{{ k8s_config_dir }}/kube-scheduler-config.yaml"
    mode: '0644'
  become: true

- name: Create kube-scheduler systemd service
  ansible.builtin.template:
    src: kube-scheduler.service.j2
    dest: /etc/systemd/system/kube-scheduler.service
    mode: '0644'
  notify:
    - Reload systemd
    - Restart kube-scheduler
  become: true

- name: Enable and start kube-scheduler
  ansible.builtin.systemd:
    name: kube-scheduler
    state: started
    enabled: true
    daemon_reload: true
  become: true
