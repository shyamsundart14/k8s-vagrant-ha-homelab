---
# kube-controller-manager configuration

- name: Create kube-controller-manager kubeconfig
  ansible.builtin.template:
    src: controller-manager.kubeconfig.j2
    dest: "{{ k8s_config_dir }}/controller-manager.kubeconfig"
    mode: '0600'
  become: true

- name: Create kube-controller-manager systemd service
  ansible.builtin.template:
    src: kube-controller-manager.service.j2
    dest: /etc/systemd/system/kube-controller-manager.service
    mode: '0644'
  notify:
    - Reload systemd
    - Restart kube-controller-manager
  become: true

- name: Enable and start kube-controller-manager
  ansible.builtin.systemd:
    name: kube-controller-manager
    state: started
    enabled: true
    daemon_reload: true
  become: true
