---
# kube-apiserver configuration

# Fetch etcd encryption key from Vault and deploy EncryptionConfiguration
- name: Fetch etcd encryption key from Vault
  community.hashi_vault.vault_kv2_get:
    url: "{{ vault_addr }}"
    token: "{{ vault_token }}"
    engine_mount_point: "secret"
    path: "kubernetes/etcd-encryption-key"
  register: encryption_key_result
  delegate_to: localhost
  run_once: true

- name: Set etcd encryption key fact
  ansible.builtin.set_fact:
    etcd_encryption_key: "{{ encryption_key_result.secret.key }}"
  no_log: true

- name: Deploy encryption configuration
  ansible.builtin.template:
    src: encryption-config.yaml.j2
    dest: "{{ k8s_config_dir }}/encryption-config.yaml"
    owner: root
    group: root
    mode: '0600'
  notify:
    - Reload systemd
    - Restart kube-apiserver
  become: true

- name: Create kube-apiserver systemd service
  ansible.builtin.template:
    src: kube-apiserver.service.j2
    dest: /etc/systemd/system/kube-apiserver.service
    mode: '0644'
  notify:
    - Reload systemd
    - Restart kube-apiserver
  become: true

- name: Enable and start kube-apiserver
  ansible.builtin.systemd:
    name: kube-apiserver
    state: started
    enabled: true
    daemon_reload: true
  become: true
