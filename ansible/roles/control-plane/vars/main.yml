---
# Kubernetes version
k8s_version: "1.32.0"

# Binary download URL
k8s_download_url: "https://dl.k8s.io/release/v{{ k8s_version }}/bin/linux/arm64"

# Certificate directories
k8s_cert_dir: "/etc/kubernetes/pki"
etcd_cert_dir: "/etc/etcd/pki"

# Kubernetes directories
k8s_config_dir: "/etc/kubernetes"
k8s_manifests_dir: "/etc/kubernetes/manifests"

# etcd endpoints (using hostnames)
etcd_endpoints: "https://etcd-1:2379,https://etcd-2:2379,https://etcd-3:2379"

# Service CIDR and Pod CIDR
service_cidr: "10.96.0.0/12"
pod_cidr: "10.244.0.0/16"

# Cluster DNS
cluster_dns: "10.96.0.10"

# API Server settings
apiserver_port: 6443
apiserver_count: 2

# Ports
controller_manager_port: 10257
scheduler_port: 10259

# HAProxy VIP for HA apiserver access
haproxy_ip: "{{ network_prefix }}.10"
