- name: Sub-CAs status
  ansible.builtin.debug:
    msg: |
      Sub-CAs status:
        - Kubernetes CA: {{ 'Generated' if k8s_ca_check.data is not defined else 'Already exists' }}
        - etcd CA: {{ 'Generated' if etcd_ca_check.data is not defined else 'Already exists' }}
        - Front Proxy CA: {{ 'Generated' if fp_ca_check.data is not defined else 'Already exists' }}
