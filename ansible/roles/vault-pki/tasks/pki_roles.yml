---
# =============================================================================
# PKI Roles for Certificate Issuance
# =============================================================================
# Creates roles that define what certificates can be issued from each CA.
# =============================================================================

# -----------------------------------------------------------------------------
# Kubernetes PKI Roles
# -----------------------------------------------------------------------------

# kube-apiserver certificate role
- name: Create kube-apiserver PKI role
  community.hashi_vault.vault_write:
    url: "{{ vault_addr }}"
    token: "{{ vault_token }}"
    path: "{{ pki_kubernetes_path }}/roles/kube-apiserver"
    data:
      allowed_domains: "{{ apiserver_allowed_domains | join(',') }}"
      allow_localhost: true
      allow_ip_sans: true
      allow_bare_domains: true
      max_ttl: "{{ leaf_cert_max_ttl }}"
      ttl: "{{ leaf_cert_max_ttl }}"
      key_type: "{{ leaf_cert_key_type }}"
      key_bits: "{{ leaf_cert_key_bits }}"
      organization: "{{ ca_organization }}"
      ou: "{{ ca_ou }}"
      country: "{{ ca_country }}"
      locality: "{{ ca_locality }}"

# kube-apiserver-kubelet-client certificate role
- name: Create kube-apiserver-kubelet-client PKI role
