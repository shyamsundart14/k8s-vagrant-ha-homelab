---
# =============================================================================
# Localhost Inventory — Used on Mac host
# =============================================================================
# Mac only connects to localhost (local) and jump (bastion).
# All other VMs are managed FROM the jump server using homelab.yml.
#
# Usage:
#   ansible-playbook -i inventory/localhost.yml playbooks/deploy.yml --ask-become-pass
# =============================================================================

all:
  hosts:
    localhost:
      ansible_connection: local
      ansible_python_interpreter: "{{ ansible_playbook_python }}"

  children:
    jump_servers:
      hosts:
        jump:
          ansible_host: "{{ network_prefix }}.12"
          ansible_user: k8s
          ansible_ssh_private_key_file: ~/.ssh/k8slab.key
          ansible_ssh_common_args: "-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null"
          ansible_python_interpreter: /usr/bin/python3
